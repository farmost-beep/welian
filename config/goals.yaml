# 社交关系AI管家 - 人生目标框架 (SPEC v4 §18)
#
# 用于联系人 leverage 锚定：标注每个核心联系人撬动哪些目标维度。
# 用户可自定义维度名称与数量，建议保持 4-8 个互斥维度。
#
# 锚定规则：
# - 仅 core 层（strength≥3）联系人才做锚定
# - 一个联系人可撬动多个目标（goals 是数组）
# - AI 逐人生成建议，用户确认后 confirmed 字段才填日期（原则二）

goals:
  - 事业    # 职业晋升、业务拓展、方法论落地
  - 投资    # 财富增长、组合优化、投资能力
  - 家庭    # 子女成长、夫妻关系、父母赡养
  - 健康    # 运动习惯、体检指标、身心状态
  - AI能力  # AI工具链、自动化、认知升级
  - 知识    # 阅读体系、技能习得、知识库建设

# direction 枚举（leverage.direction 字段取值）
directions:
  - 我求于他
  - 他求于我
  - 互惠
