<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Welian — 绑定微信</title>
<meta name="theme-color" content="#F5F4EE">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<!-- Clerk — authentication -->
<script defer crossorigin="anonymous"
  src="https://fancy-kingfish-81.clerk.accounts.dev/npm/@clerk/clerk-js@4/dist/clerk.browser.js"
  data-clerk-publishable-key="pk_test_ZmFuY3kta2luZ2Zpc2gtODEuY2xlcmsuYWNjb3VudHMuZGV2JA"
  type="text/javascript"></script>
<script>
// Load Clerk UI bundle (required for mountSignIn/mountSignUp)
async function loadClerkUI(publishableKey) {
  try {
    const clerkDomain = atob(publishableKey.split('_')[2]).slice(0, -1);
    await new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = `https://${clerkDomain}/npm/@clerk/ui@1/dist/ui.browser.js`;
      script.async = true;
      script.crossOrigin = 'anonymous';
      script.onload = resolve;
      script.onerror = () => reject(new Error('Failed to load Clerk UI'));
      document.head.appendChild(script);
    });
    return true;
  } catch(e) {
    console.log('Clerk UI load failed:', e.message);
    return false;
  }
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F4EE;--surface:#EDEBE3;--border:#D9D5C7;
  --text:#1A1915;--dim:#6B6860;--accent:#C96442;--green:#4A7C59;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--surface);border-radius:16px;padding:40px;max-width:420px;width:90%;text-align:center}
h1{font-size:24px;margin-bottom:8px;font-weight:600}
.sub{color:var(--dim);font-size:14px;margin-bottom:24px}
#clerk-mount{min-height:300px;margin-bottom:16px}
.status{padding:12px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none}
.status.ok{background:#E8F0E8;color:var(--green);display:block}
.status.err{background:#F2E8E0;color:var(--accent);display:block}
.status.loading{background:#E8E8F0;color:#4A5C7C;display:block}
.wechat-id{font-family:monospace;font-size:13px;color:var(--dim);background:var(--bg);padding:4px 8px;border-radius:4px;display:inline-block;margin:4px 0}
.user-info{background:var(--bg);border-radius:12px;padding:20px;margin:16px 0}
.user-info .name{font-size:18px;font-weight:600;margin-bottom:4px}
.user-info .email{font-size:14px;color:var(--dim)}
</style>
</head>
<body>
<div class="card">
  <h1>🔗 绑定微信</h1>
  <p class="sub">登录后，你的微信就能和小维连通了</p>
  <div id="clerk-mount"></div>
  <div id="manual-bind" style="display:none;margin-bottom:16px">
    <button class="btn" onclick="bindAttempted=false;doBind()">🔗 立即绑定</button>
  </div>
  <div id="status" class="status"></div>
  <div id="bound-section" style="display:none">
    <div class="user-info">
      <div class="name" id="bound-name"></div>
      <div class="email" id="bound-email"></div>
    </div>
    <p style="color:var(--dim);font-size:13px">现在可以在微信里直接和小维聊天了 ✨</p>
  </div>
</div>

<script>
const API = 'https://api.welian.app';
const PUBLISHABLE_KEY = 'pk_test_ZmFuY3kta2luZ2Zpc2gtODEuY2xlcmsuYWNjb3VudHMuZGV2JA';

const params = new URLSearchParams(location.search);
const wechatId = params.get('wid') || params.get('wechat_id') || '';
let bindAttempted = false;

if (!wechatId) {
  showStatus('err', '缺少微信用户 ID。请从微信里的 /login 命令打开此链接。');
} else {
  initClerk();
}

async function initClerk() {
  // Wait for Clerk to load
  await new Promise(resolve => {
    if (window.Clerk) return resolve();
    const interval = setInterval(() => {
      if (window.Clerk) { clearInterval(interval); resolve(); }
    }, 100);
  });

  // Load Clerk UI bundle (required for mountSignIn)
  await loadClerkUI(PUBLISHABLE_KEY);

  try {
    await window.Clerk.load();
  } catch(e) {
    console.log('Clerk load:', e.message);
  }

  // Check if already logged in
  if (window.Clerk.user) {
    await doBind();
  } else {
    await mountSignIn();
  }

  // Poll for login completion
  const pollInterval = setInterval(async () => {
    if (window.Clerk.user && !bindAttempted) {
      bindAttempted = true;
      clearInterval(pollInterval);
      document.getElementById('clerk-mount').style.display = 'none';
      document.getElementById('manual-bind').style.display = 'block';
      await doBind();
    }
    // Show manual bind button if logged in but bind hasn't happened
    if (window.Clerk.user && bindAttempted) {
      document.getElementById('manual-bind').style.display = 'block';
    }
  }, 500);
  setTimeout(() => clearInterval(pollInterval), 300000);
}

async function mountSignIn() {
  const mountEl = document.getElementById('clerk-mount');
  // Fresh div each time (Clerk can't re-mount on same element)
  mountEl.innerHTML = '<div id="clerk-signin"></div>';
  const signinEl = document.getElementById('clerk-signin');
  try {
    await window.Clerk.mountSignIn(signinEl);
  } catch(e) {
    showStatus('err', '登录组件加载失败：' + e.message);
  }
}

async function doBind() {
  if (bindAttempted) return;
  bindAttempted = true;
  showStatus('loading', '正在绑定...');

  try {
    // Wait for session
    let session = window.Clerk.session;
    let retries = 0;
    while (!session && retries < 10) {
      await new Promise(r => setTimeout(r, 300));
      session = window.Clerk.session;
      retries++;
    }
    if (!session) {
      showStatus('err', '登录会话未就绪，请刷新页面重试');
      bindAttempted = false;
      return;
    }

    const token = await session.getToken();
    console.log('Clerk token:', token ? token.substring(0, 30) + '...' : 'null');

    const resp = await fetch(`${API}/ai/bind_wechat`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
      },
      body: JSON.stringify({ wechat_user_id: wechatId }),
    });

    const data = await resp.json();
    console.log('Bind response:', resp.status, data);

    if (resp.ok && data.ok) {
      const name = data.name || '';
      const email = data.email || '';
      document.getElementById('bound-name').textContent = name || '已绑定';
      document.getElementById('bound-email').textContent = email || '';
      document.getElementById('bound-section').style.display = 'block';
      document.getElementById('clerk-mount').style.display = 'none';
      showStatus('ok', '✅ 绑定成功！');
    } else {
      showStatus('err', data.error || `绑定失败 (HTTP ${resp.status})`);
      bindAttempted = false;
    }
  } catch(e) {
    console.error('Bind error:', e);
    showStatus('err', '绑定出错：' + e.message);
    bindAttempted = false;
  }
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}
</script>
</body>
</html>
