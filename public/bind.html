<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Welian — 绑定微信</title>
<meta name="theme-color" content="#F5F4EE">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script defer crossorigin="anonymous"
  src="https://fancy-kingfish-81.clerk.accounts.dev/npm/@clerk/clerk-js@4/dist/clerk.browser.js"
  data-clerk-publishable-key="pk_test_ZmFuY3kta2luZ2Zpc2gtODEuY2xlcmsuYWNjb3VudHMuZGV2JA"
  type="text/javascript"></script>
<script>
async function loadClerkUI(publishableKey) {
  try {
    const clerkDomain = atob(publishableKey.split('_')[2]).slice(0, -1);
    await new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = `https://${clerkDomain}/npm/@clerk/ui@1/dist/ui.browser.js`;
      script.async = true;
      script.crossOrigin = 'anonymous';
      script.onload = resolve;
      script.onerror = () => reject(new Error('Failed to load Clerk UI'));
      document.head.appendChild(script);
    });
    return true;
  } catch(e) {
    console.log('Clerk UI load failed:', e.message);
    return false;
  }
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F4EE;--surface:#EDEBE3;--border:#D9D5C7;
  --text:#1A1915;--dim:#6B6860;--accent:#C96442;--green:#4A7C59;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden}
.card{background:var(--surface);border-radius:16px;padding:40px;max-width:420px;width:90%;text-align:center}
h1{font-size:24px;margin-bottom:8px;font-weight:600}
.sub{color:var(--dim);font-size:14px;margin-bottom:24px}
#clerk-mount{min-height:300px;margin-bottom:16px;width:100%;display:flex;justify-content:center}
.status{padding:12px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none;word-break:break-word}
.status.ok{background:#E8F0E8;color:var(--green);display:block}
.status.err{background:#F2E8E0;color:var(--accent);display:block}
.status.loading{background:#E8E8F0;color:#4A5C7C;display:block}
.btn{background:var(--accent);color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:15px;cursor:pointer;width:100%;margin-top:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.secondary{background:transparent;color:var(--dim);border:1px solid var(--border)}
.user-info{background:var(--bg);border-radius:12px;padding:20px;margin:16px 0;text-align:left}
.user-info .row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.user-info .avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0}
.user-info .name{font-size:16px;font-weight:600;word-break:break-word}
.user-info .email{font-size:14px;color:var(--dim);word-break:break-all}
.user-info .label{font-size:12px;color:var(--dim);margin-bottom:4px}

/* 手机端：减小 padding 让 Clerk 自然宽度卡片放下 */
@media(max-width:480px){
  .card{
    width:100%;
    max-width:none;
    border-radius:0;
    padding:20px 12px;
    min-height:100vh;
  }
  h1{font-size:20px}
  #clerk-mount{min-height:280px}
  .user-info{padding:16px}
}
</style>
</head>
<body>
<div class="card">
  <h1>🔗 绑定微信</h1>
  <p class="sub">将你的 Welian 账号绑定到微信</p>

  <!-- Step 1: Login -->
  <div id="clerk-mount"></div>

  <!-- Step 2: Confirm (shown after login) -->
  <div id="confirm-section" style="display:none">
    <div class="user-info">
      <div class="label">将绑定以下账号：</div>
      <div class="row">
        <div class="avatar" id="user-avatar"></div>
        <div>
          <div class="name" id="user-name"></div>
          <div class="email" id="user-email"></div>
        </div>
      </div>
    </div>
    <button class="btn" onclick="doBind()">✅ 确认绑定</button>
    <button class="btn secondary" onclick="switchAccount()">切换账号</button>
  </div>

  <!-- Step 3: Success -->
  <div id="bound-section" style="display:none">
    <div class="user-info">
      <div class="row">
        <div class="avatar" id="bound-avatar"></div>
        <div>
          <div class="name" id="bound-name"></div>
          <div class="email" id="bound-email"></div>
        </div>
      </div>
    </div>
    <p style="color:var(--green);font-size:15px;margin:16px 0">✅ 绑定成功！</p>
    <p style="color:var(--dim);font-size:13px">现在可以回到微信，和小维聊天了 ✨</p>
  </div>

  <div id="status" class="status"></div>
</div>

<script>
const API = 'https://api.welian.app';
const PUBLISHABLE_KEY = 'pk_test_ZmFuY3kta2luZ2Zpc2gtODEuY2xlcmsuYWNjb3VudHMuZGV2JA';

const params = new URLSearchParams(location.search);
const wechatId = params.get('wid') || params.get('wechat_id') || '';

if (!wechatId) {
  showStatus('err', '缺少微信用户 ID。请从微信里的 /login 命令打开此链接。');
} else {
  initClerk();
}

async function initClerk() {
  // Wait for Clerk
  await new Promise(resolve => {
    if (window.Clerk) return resolve();
    const interval = setInterval(() => {
      if (window.Clerk) { clearInterval(interval); resolve(); }
    }, 100);
  });

  await loadClerkUI(PUBLISHABLE_KEY);

  try {
    await window.Clerk.load({
      appearance: {
        elements: {
          card: 'max-width: 360px !important; margin: 0 auto !important;',
          cardBox: 'max-width: 360px !important;',
          footerActionLink: 'font-size: 13px !important;',
          headerTitle: 'font-size: 20px !important;',
          headerSubtitle: 'font-size: 14px !important;'
        }
      }
    });
  } catch(e) { console.log('Clerk load:', e.message); }

  if (window.Clerk.user) {
    showConfirm();
  } else {
    await mountSignIn();
  }

  // Poll for login
  const pollInterval = setInterval(() => {
    if (window.Clerk.user && document.getElementById('confirm-section').style.display === 'none'
        && document.getElementById('bound-section').style.display === 'none') {
      showConfirm();
    }
  }, 500);
  setTimeout(() => clearInterval(pollInterval), 300000);
}

async function mountSignIn() {
  const mountEl = document.getElementById('clerk-mount');
  mountEl.innerHTML = '<div id="clerk-signin"></div>';
  const signinEl = document.getElementById('clerk-signin');
  try {
    await window.Clerk.mountSignIn(signinEl);
  } catch(e) {
    showStatus('err', '登录组件加载失败：' + e.message);
  }
}

function showConfirm() {
  const user = window.Clerk.user;
  if (!user) return;

  const name = (user.firstName || '') + ' ' + (user.lastName || '');
  const displayName = name.trim() || user.username || '';
  const email = user.primaryEmailAddress?.emailAddress || '';

  document.getElementById('user-name').textContent = displayName || '已登录';
  document.getElementById('user-email').textContent = email;
  document.getElementById('user-avatar').textContent = (displayName || email || '?')[0].toUpperCase();

  document.getElementById('clerk-mount').style.display = 'none';
  document.getElementById('confirm-section').style.display = 'block';
}

async function switchAccount() {
  // Sign out and show login again
  try {
    await window.Clerk.signOut();
  } catch(e) { console.log('signOut error:', e); }
  document.getElementById('confirm-section').style.display = 'none';
  document.getElementById('clerk-mount').style.display = 'block';
  document.getElementById('clerk-mount').innerHTML = '<div id="clerk-signin"></div>';
  await window.Clerk.mountSignIn(document.getElementById('clerk-signin'));
}

async function doBind() {
  showStatus('loading', '正在绑定...');

  try {
    let session = window.Clerk.session;
    let retries = 0;
    while (!session && retries < 10) {
      await new Promise(r => setTimeout(r, 300));
      session = window.Clerk.session;
      retries++;
    }
    if (!session) {
      showStatus('err', '登录会话未就绪，请刷新页面重试');
      return;
    }

    const token = await session.getToken();

    const resp = await fetch(`${API}/ai/bind_wechat`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
      },
      body: JSON.stringify({ wechat_user_id: wechatId }),
    });

    const data = await resp.json();
    console.log('Bind response:', resp.status, data);

    if (resp.ok && data.ok) {
      const name = data.name || '';
      const email = data.email || '';
      document.getElementById('bound-name').textContent = name || '已绑定';
      document.getElementById('bound-email').textContent = email;
      document.getElementById('bound-avatar').textContent = (name || email || '?')[0].toUpperCase();
      document.getElementById('confirm-section').style.display = 'none';
      document.getElementById('bound-section').style.display = 'block';
      showStatus('ok', '绑定成功！请回到微信查看。');
    } else {
      showStatus('err', data.error || `绑定失败 (HTTP ${resp.status})`);
    }
  } catch(e) {
    console.error('Bind error:', e);
    showStatus('err', '绑定出错：' + e.message);
  }
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}
</script>
</body>
</html>
