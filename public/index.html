<script>
// Load Clerk UI bundle (required for mountSignIn/mountSignUp)
async function loadClerkUI(publishableKey) {
  try {
    const clerkDomain = atob(publishableKey.split('_')[2]).slice(0, -1);
    await new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = `https://${clerkDomain}/npm/@clerk/ui@1/dist/ui.browser.js`;
      script.async = true;
      script.crossOrigin = 'anonymous';
      script.onload = resolve;
      script.onerror = () => reject(new Error('Failed to load Clerk UI'));
      document.head.appendChild(script);
    });
    return true;
  } catch(e) {
    console.log('Clerk UI load failed:', e.message);
    return false;
  }
}

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F4EE;--surface:#EDEBE3;--surface2:#E4E1D6;--border:#D9D5C7;
  --text:#1A1915;--dim:#6B6860;--dimmer:#9A968C;
  --accent:#C96442;--accent-bg:#F2E8E0;--green:#4A7C59;
  --shadow-sm:0 1px 2px rgba(26,25,21,.04),0 2px 8px rgba(26,25,21,.04);
  --shadow-md:0 2px 8px rgba(26,25,21,.06),0 8px 24px rgba(26,25,21,.06);
  --shadow-lg:0 4px 16px rgba(26,25,21,.08),0 16px 48px rgba(26,25,21,.08);
  --chat-max:768px;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── Nav (minimal, floating) ── */
nav{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;position:sticky;top:0;background:rgba(245,244,238,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:50;border-bottom:1px solid transparent;transition:border-color .3s}
nav.scrolled{border-bottom-color:var(--border)}
nav .brand{display:flex;align-items:center;gap:3px}
nav .brand .name{font-family:'Newsreader',serif;font-size:1.15em;font-weight:500;letter-spacing:-.01em}
nav .brand .inf{color:var(--accent);font-size:1.05em}
nav .links{display:flex;gap:10px;align-items:center}
nav .links a{font-size:.8em;color:var(--dim);text-decoration:none;transition:color .2s}
nav .links .cta{background:var(--text);color:var(--bg);padding:6px 16px;border-radius:8px;font-size:.8em;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:transform .15s}
nav .links .cta:active{transform:scale(.96)}
nav .links .desktop-only{display:none}
nav #langBtn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:.8em;cursor:pointer;color:var(--dim);font-family:inherit;transition:border-color .2s,color .2s}
nav #langBtn:active{border-color:var(--accent);color:var(--accent)}
nav .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
nav .status-dot.offline{background:var(--dimmer)}
nav .status-dot.online{background:var(--green);box-shadow:0 0 0 3px rgba(74,124,89,.15)}
nav .status-text{font-size:.72em;color:var(--dim)}
nav .mode-badge{font-size:.62em;padding:2px 8px;border-radius:20px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;transition:all .3s}
nav .mode-badge.live{background:var(--green);color:#fff;box-shadow:0 0 0 3px rgba(74,124,89,.18)}

/* ── Page layout: chat fills the screen ── */
.page{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Chat area (ChatGPT-style: centered column, scrollable) ── */
main{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden}

/* Chat body — scrollable message stream */
.chat-body{flex:1;overflow-y:auto;width:100%;max-width:var(--chat-max);margin:0 auto;padding:24px 20px 140px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.chat-body::-webkit-scrollbar{width:4px}
.chat-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Messages — no bubbles, clean text blocks (ChatGPT style) */
.msg{margin-bottom:24px;animation:fadein .4s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg .who{font-size:.75em;font-weight:600;margin-bottom:6px;letter-spacing:.02em}
.msg .who.you{color:var(--accent)}
.msg .who.ai{color:var(--green)}
.msg .bubble{font-size:.95em;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg .bubble.you{color:var(--text)}
.msg .bubble.ai{color:var(--text)}
.msg .bubble.system{color:var(--dim);font-size:.85em;padding:12px 16px;background:var(--surface);border-radius:10px;border:1px solid var(--border)}
.msg .typing{display:inline-block;width:7px;height:15px;background:var(--green);border-radius:1px;animation:blink 1s infinite;vertical-align:text-bottom}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}

/* Welcome / empty state — centered tagline + suggestions (overlay on top of chat) */
.welcome-state{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px 20px 140px;z-index:5;pointer-events:auto;transition:opacity .3s}
.welcome-state.hidden{opacity:0;pointer-events:none}
.welcome-state .tagline{font-family:'Newsreader',serif;font-size:1.8em;font-weight:400;letter-spacing:-.01em;line-height:1.3;margin-bottom:10px;color:var(--text)}
.welcome-state .tagline em{font-style:italic;color:var(--accent);font-weight:500}
.welcome-state .tagline-sub{font-size:.82em;color:var(--dim);margin-bottom:28px}

/* Suggestion cards (ChatGPT-style) */
.suggestions{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:520px}
.suggestion-card{padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:var(--surface);cursor:pointer;transition:.2s;text-align:left;display:flex;flex-direction:column;gap:4px}
.suggestion-card:active{border-color:var(--accent);background:var(--accent-bg);transform:scale(.97)}
.suggestion-card .title{font-size:.85em;font-weight:500;color:var(--text)}
.suggestion-card .desc{font-size:.72em;color:var(--dimmer);line-height:1.4}

/* ── Input dock (bottom, ChatGPT-style rounded box) ── */
.input-dock{position:fixed;bottom:0;left:0;right:0;padding:12px 20px 20px;background:linear-gradient(to top,var(--bg) 60%,rgba(245,244,238,0));z-index:20;display:flex;justify-content:center;pointer-events:none}
.input-box{width:100%;max-width:var(--chat-max);background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:8px 8px 8px 20px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-md);pointer-events:auto;transition:border-color .2s}
.input-box:focus-within{border-color:var(--dim)}
.input-box input{flex:1;background:none;border:none;color:var(--text);font-size:.95em;font-family:inherit;outline:none;min-width:0;padding:8px 0}
.input-box input::placeholder{color:var(--dimmer)}
.input-box input:disabled{color:var(--dimmer)}
.input-box .send{width:36px;height:36px;border-radius:50%;background:var(--text);color:var(--bg);border:none;cursor:pointer;font-size:1.1em;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;font-family:inherit;line-height:1}
.input-box .send:active{transform:scale(.9);background:var(--accent)}
.input-box .send:disabled{background:var(--dimmer);cursor:default}

/* Input hint below dock */
.input-hint{text-align:center;font-size:.68em;color:var(--dimmer);padding:4px 0 0}

/* ── Connect panel (inside chat body) ── */
.connect-panel{padding:20px 0;text-align:center}
.connect-panel h3{font-family:'Newsreader',serif;font-size:1.15em;font-weight:400;margin-bottom:12px}
.connect-panel p{font-size:.82em;color:var(--dim);margin-bottom:16px;line-height:1.7}
.connect-panel code{background:var(--surface2);padding:3px 10px;border-radius:6px;font-size:.85em;font-family:'SF Mono',Consolas,monospace;color:var(--accent)}
.connect-panel .step{font-size:.8em;color:var(--dim);text-align:left;margin:10px auto;max-width:340px;line-height:1.8}
.connect-panel .step b{color:var(--text)}
.connect-panel input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:.85em;font-family:inherit;width:220px;text-align:center;outline:none;margin:4px}
.connect-panel input:focus{border-color:var(--accent)}
.connect-panel button{background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:10px;font-size:.85em;font-family:inherit;cursor:pointer;margin:4px;transition:transform .15s}
.connect-panel button:active{transform:scale(.96);opacity:.9}
.connect-panel .err{color:#C65D5D;font-size:.75em;margin-top:8px}

/* ── Footer (minimal) ── */
footer{border-top:1px solid var(--border);padding:12px 20px;text-align:center;font-size:.7em;color:var(--dim);display:flex;flex-direction:column;gap:4px;align-items:center}
footer a{color:var(--dim);text-decoration:none}
footer .sep{display:none}
footer .inf{color:var(--accent)}
footer .privacy{color:var(--dimmer);max-width:400px}

/* ── Clerk auth ── */
#clerk-auth{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(245,244,238,.95);display:none;align-items:center;justify-content:center;z-index:100;padding:24px;overflow-y:auto;box-sizing:border-box}
#clerk-auth.show{display:flex}
#clerk-auth .card{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:440px;width:100%;box-shadow:var(--shadow-lg);box-sizing:border-box;position:relative;overflow:visible}
#clerk-auth .card h2{font-family:'Newsreader',serif;font-size:1.4em;font-weight:400;margin-bottom:6px;text-align:center}
#clerk-auth .card p{text-align:center;font-size:.85em;color:var(--dim);margin-bottom:24px}
#clerk-auth .close{position:absolute;top:18px;right:22px;font-size:1.3em;color:var(--dim);cursor:pointer;background:none;border:none;z-index:1;line-height:1}
#clerk-auth #clerk-container{overflow:visible;max-width:100%}
#clerk-auth .cl-internal,#clerk-auth .cl-card,#clerk-auth .cl-form{max-width:100%!important;min-width:0!important}
#clerk-auth .cl-socialButtonsBlockButton{max-width:100%!important}

/* ── Mobile ── */
@media(max-width:480px){
  #clerk-auth .card{padding:24px 18px;border-radius:16px}
  #clerk-auth .card h2{font-size:1.2em}
  #clerk-auth #clerk-container{overflow-x:hidden;max-width:100%}
  #clerk-auth .cl-card,.cl-card-socialButtonsBlock,.cl-form{max-width:100%!important;min-width:0!important}
  #clerk-auth .cl-socialButtonsBlockButton{width:100%!important}
  nav{padding:8px 14px}
  nav .links{gap:8px}
  nav .links .desktop-only{display:none}
  .chat-body{padding:16px 14px 130px}
  .welcome-state .tagline{font-size:1.5em}
  .suggestions{grid-template-columns:1fr;gap:8px}
  .input-dock{padding:8px 14px 16px}
  footer{padding:10px 14px}
}

/* ── Tablet ── */
@media(min-width:481px) and (max-width:879px){
  .welcome-state .tagline{font-size:1.7em}
}

/* ── Desktop ── */
@media(min-width:880px){
  body{font-size:16px}
  nav{padding:12px 48px}
  nav .links{gap:20px}
  nav .links a{font-size:.85em}
  nav .links .desktop-only{display:inline}
  nav .links .cta{padding:7px 18px;font-size:.82em}
  .welcome-state .tagline{font-size:2em}
  .welcome-state .tagline-sub{font-size:.88em}
  .suggestions{max-width:600px;gap:12px}
  .suggestion-card{padding:16px 18px}
  .suggestion-card .title{font-size:.9em}
  .suggestion-card .desc{font-size:.76em}
  .input-dock{padding:12px 24px 20px}
  .input-box{padding:10px 10px 10px 22px}
  .input-box .send{width:38px;height:38px}
  .suggestion-card:hover{border-color:var(--accent);background:var(--accent-bg)}
  footer{flex-direction:row;justify-content:space-between;align-items:center;padding:14px 48px;text-align:left;max-width:var(--chat-max);margin:0 auto;width:100%}
  footer .sep{display:inline}
  footer .privacy{max-width:none}
}

/* ── Large desktop ── */
@media(min-width:1200px){
  :root{--chat-max:820px}
  .welcome-state .tagline{font-size:2.2em}
}
</style>

let currentLang = localStorage.getItem('welian_lang') || 'en';

function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('welian_lang', lang);
  const dict = I18N[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[key]) el.innerHTML = dict[key];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const key = el.getAttribute('data-i18n-ph');
    if (dict[key]) el.placeholder = dict[key];
  });
  document.getElementById('langBtn').textContent = lang === 'en' ? '中文' : 'EN';
  document.getElementById('authBtn').textContent = dict.sign_in;
}

function toggleLang() {
  applyLang(currentLang === 'en' ? 'zh' : 'en');
}

if (wechatToken) {
  // Clean URL and set session
  history.replaceState(null, '', location.pathname);
}

// ── Main app (below) ──

// ── State ──
let isAuthed = false;   // Clerk auth state
let isLive = false;     // Connected to local agent
let clerkInstance = null;
let clerkUserId = null; // Clerk user ID for device discovery
let isCliLogin = false; // CLI login mode — wait for explicit sign-in
let cliLoginInitialUserId = null; // existing user ID to ignore
let existingUserId = null; // pre-existing session to ignore (no auto-login)
let userInitiatedLogin = false; // set true when user clicks Sign in

// Global listener for device-id from bridge (survives after tryBridgeConnect handler is removed)
window.addEventListener('message', (e) => {
  const msg = e.data;
  if (!msg || msg.source !== 'welian-bridge') return;
  if (msg.type === 'device-id' && msg.device_id) {
    console.log('Bridge device_id:', msg.device_id);
    // Agent already registered tunnel with user_id via CLI login — no linking needed
  }
});

const body = document.getElementById('chatBody');
const input = document.getElementById('input');
const modeBadge = document.getElementById('modeBadge'); // null (removed from UI)
const navStatus = document.getElementById('navStatus');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const authBtn = document.getElementById('authBtn');
const welcomeState = document.getElementById('welcomeState');

// ── Nav scroll effect ──
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 4);
});

// ── Clerk init ──
let clerkReady = false;

async function initClerk() {
  if (!CLERK_PUBLISHABLE_KEY) {
    console.log('Clerk not configured — running in demo mode');
    return;
  }

  try {
    // Wait for Clerk CDN script to load and auto-init
    // The CDN script with data-clerk-publishable-key auto-initializes window.Clerk
    let attempts = 0;
    while (typeof window.Clerk === 'undefined' && attempts < 50) {
      await new Promise(r => setTimeout(r, 100));
      attempts++;
    }

    if (typeof window.Clerk === 'undefined') {
      console.error('Clerk CDN script failed to load');
      return;
    }

    console.log('Clerk global available, waiting for load...');
    clerkInstance = window.Clerk;

    // Wait for Clerk to be loaded
    if (!clerkInstance.loaded) {
      await clerkInstance.load();
    }
    console.log('Clerk loaded, status:', clerkInstance.status);

    // Load UI bundle for mountSignIn
    await loadClerkUI(CLERK_PUBLISHABLE_KEY);
    console.log('UI bundle loaded, ClerkUICtor:', typeof window.__internal_ClerkUICtor);

    clerkReady = true;

    // Check if user initiated login in this browser session (survives page reload)
    const loginInitiated = sessionStorage.getItem('welian_login_initiated') === '1';
    if (loginInitiated) {
      console.log('Login was initiated this session — accepting session');
    }

    // Record existing session to ignore it (no auto-login) unless login was initiated
    existingUserId = clerkInstance.user ? clerkInstance.user.id : null;
    if (existingUserId && !loginInitiated) {
      console.log('Existing Clerk session found, will ignore (no auto-login):', existingUserId);
    }

    // Set CLI login mode
    if (cliCallback) {
      isCliLogin = true;
      cliLoginInitialUserId = existingUserId;
      console.log('CLI login: initial user:', cliLoginInitialUserId);
    }

    // Handle WeChat OAuth return: set session from token
    if (wechatToken) {
      try {
        console.log('Setting WeChat session token…');
        await clerkInstance.setActive({ session: wechatToken });
        console.log('WeChat session set, reloading…');
      } catch(e) {
        console.error('WeChat session set failed:', e);
        addSystemMsg('微信登录失败：' + e.message);
      }
    }

    // Listen for auth state changes
    // Ignore the initial cached session unless login was initiated (user clicked Sign in)
    clerkInstance.addListener((event) => {
      console.log('Clerk event:', Object.keys(event), 'user:', !!event.user, 'isAuthed:', isAuthed);
      if (event.user && !isAuthed) {
        // Ignore pre-existing session unless user manually initiated login
        if (event.user.id === existingUserId && !userInitiatedLogin && !loginInitiated && !wechatToken && !cliCallback) {
          console.log('Ignoring pre-existing session (no auto-login):', event.user.id);
          return;
        }
        if (isCliLogin && event.user.id === cliLoginInitialUserId) {
          console.log('CLI login: ignoring existing session for', event.user.id);
          return;
        }
        isCliLogin = false;
        userInitiatedLogin = false;
        sessionStorage.removeItem('welian_login_initiated');
        onAuthed(event.user);
      } else if (!event.user && isAuthed) {
        sessionStorage.removeItem('welian_login_initiated');
        onSignedOut();
      }
    });

    // CLI login flow: show sign-in form immediately
    if (cliCallback) {
      console.log('CLI login: showing form, initial user:', cliLoginInitialUserId);
      document.getElementById('clerk-auth').classList.add('show');
      const container = document.getElementById('clerk-container');

      if (cliLoginInitialUserId) {
        container.innerHTML = '<div style="text-align:center;padding:8px 0 12px;font-size:.8em;color:var(--dim)">当前账号: ' + cliLoginInitialUserId.slice(-8) + '<br>请用其他账号登录，或关闭此页保持当前账号</div>';
        const formDiv = document.createElement('div');
        container.appendChild(formDiv);
        clerkInstance.mountSignIn(formDiv);
      } else {
        mountClerkSignIn(container);
      }
      console.log('CLI login: sign-in form shown, waiting for new login');
    }
    // No auto-login: user must click "Sign in" manually
  } catch(e) {
    console.error('Clerk init failed:', e);
    clerkReady = false;
  }
}

function wechatLogin() {
  // Redirect to Worker's WeChat OAuth endpoint
  // Worker will redirect to WeChat, then back with session token
  const redirect = encodeURIComponent(location.origin + location.pathname);
  window.location.href = `${DISCOVERY_URL}/auth/wechat?redirect=${redirect}`;
}

// ── Phone SMS login ──

function showPhoneLogin() {
  const d = I18N[currentLang];
  // Replace auth card content with phone login form
  const card = document.querySelector('#clerk-auth .card');
  card.innerHTML = `
    <button class="close" onclick="toggleAuth()">×</button>
    <h2>${d.phone_title}</h2>
    <div id="phone-login-form" style="margin-top:16px">
      <input id="phone-input" type="tel" placeholder="${d.phone_ph}" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:.95em;margin-bottom:10px;box-sizing:border-box" autocomplete="off">
      <button id="phone-send-btn" onclick="sendSMS()" style="width:100%;padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.9em;cursor:pointer">${d.phone_send}</button>
      <div id="phone-msg" style="font-size:.8em;margin-top:8px;min-height:1em"></div>
    </div>
    <div id="phone-verify-form" style="display:none;margin-top:16px">
      <input id="phone-code-input" type="text" placeholder="${d.phone_code_ph}" maxlength="6" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:1.1em;letter-spacing:4px;margin-bottom:10px;box-sizing:border-box;text-align:center" autocomplete="off">
      <button id="phone-verify-btn" onclick="verifySMS()" style="width:100%;padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.9em;cursor:pointer;margin-bottom:8px">${d.phone_verify}</button>
      <button onclick="showPhoneLogin()" style="width:100%;padding:8px;background:none;border:none;color:var(--dim);font-size:.85em;cursor:pointer">${d.phone_back}</button>
    </div>
  `;
}

let smsPhone = '';

async function sendSMS() {
  const d = I18N[currentLang];
  const phone = document.getElementById('phone-input').value.trim();
  if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
    document.getElementById('phone-msg').textContent = d.phone_err_phone;
    document.getElementById('phone-msg').style.color = '#C65D5D';
    return;
  }
  smsPhone = phone;
  const btn = document.getElementById('phone-send-btn');
  btn.disabled = true;
  btn.textContent = d.phone_sending;

  try {
    const resp = await fetch(`${DISCOVERY_URL}/auth/sms/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone }),
    });
    const data = await resp.json();
    if (data.ok) {
      document.getElementById('phone-msg').textContent = d.phone_sent;
      document.getElementById('phone-msg').style.color = '#4a9';
      // Show verify form
      document.getElementById('phone-login-form').style.display = 'none';
      document.getElementById('phone-verify-form').style.display = 'block';
      document.getElementById('phone-code-input').focus();
      // Countdown
      let count = 60;
      btn.textContent = count + d.phone_countdown;
      const timer = setInterval(() => {
        count--;
        if (count <= 0) {
          clearInterval(timer);
          btn.disabled = false;
          btn.textContent = d.phone_send;
        } else {
          btn.textContent = count + d.phone_countdown;
        }
      }, 1000);
    } else {
      btn.disabled = false;
      btn.textContent = d.phone_send;
      document.getElementById('phone-msg').textContent = d.phone_err + (data.error || '');
      document.getElementById('phone-msg').style.color = '#C65D5D';
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = d.phone_send;
    document.getElementById('phone-msg').textContent = d.phone_err + e.message;
    document.getElementById('phone-msg').style.color = '#C65D5D';
  }
}

async function verifySMS() {
  const d = I18N[currentLang];
  const code = document.getElementById('phone-code-input').value.trim();
  if (!code || code.length !== 6) {
    return;
  }
  const btn = document.getElementById('phone-verify-btn');
  btn.disabled = true;
  btn.textContent = d.phone_verifying;

  try {
    const resp = await fetch(`${DISCOVERY_URL}/auth/sms/verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: smsPhone, code }),
    });
    const data = await resp.json();
    if (data.ok && data.jwt) {
      // Set Clerk session
      if (clerkInstance) {
        await clerkInstance.setActive({ session: data.jwt });
      }
      // Close modal — onAuthed will fire from Clerk listener
      document.getElementById('clerk-auth').classList.remove('show');
    } else {
      btn.disabled = false;
      btn.textContent = d.phone_verify;
      const msg = document.createElement('div');
      msg.style.cssText = 'font-size:.8em;color:#C65D5D;margin-top:8px';
      msg.textContent = data.error || d.phone_err_code;
      document.getElementById('phone-verify-form').appendChild(msg);
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = d.phone_verify;
  }
}

function toggleAuth() {
  if (isAuthed) {
    // Sign out
    if (clerkInstance) clerkInstance.signOut();
    onSignedOut();
  } else {
    // User manually initiated login — accept the next auth event
    userInitiatedLogin = true;
    sessionStorage.setItem('welian_login_initiated', '1');
    // Show auth modal
    document.getElementById('clerk-auth').classList.add('show');
    const container = document.getElementById('clerk-container');

    if (!clerkReady || !clerkInstance) {
      container.innerHTML = '<p style="text-align:center;color:var(--dim);padding:20px">Loading Clerk...<br><small>If this persists, check console for errors.</small></p>';
      // Wait for clerk to be ready
      const wait = setInterval(() => {
        if (clerkReady && clerkInstance) {
          clearInterval(wait);
          mountClerkSignIn(container);
        }
      }, 500);
      setTimeout(() => clearInterval(wait), 10000);
      return;
    }

    mountClerkSignIn(container);
  }
}

function mountClerkSignIn(container) {
  try {
    container.innerHTML = '';
    clerkInstance.mountSignIn(container);
    console.log('mountSignIn called');
  } catch(e) {
    console.error('mountSignIn failed:', e);
    container.innerHTML = '<p style="color:#C65D5D;text-align:center;padding:20px">Failed to load sign-in form.<br><small>' + e.message + '</small></p>';
  }
}

function mountClerkSignUp() {
  const container = document.getElementById('clerk-container');
  try {
    container.innerHTML = '';
    clerkInstance.mountSignUp(container);
    console.log('mountSignUp called');
  } catch(e) {
    console.error('mountSignUp failed:', e);
    container.innerHTML = '<p style="color:#C65D5D;text-align:center;padding:20px">Failed to load sign-up form.<br><small>' + e.message + '</small></p>';
  }
}

function onAuthed(user) {
  isAuthed = true;
  clerkUserId = user.id || null;
  authBtn.textContent = user.firstName || user.username || 'Account';
  navStatus.style.display = 'inline-flex';
  // Close auth modal if open
  document.getElementById('clerk-auth').classList.remove('show');

  // CLI login flow: redirect user_id back to CLI callback
  if (cliCallback && clerkUserId) {
    window.location.href = cliCallback + '?user_id=' + encodeURIComponent(clerkUserId);
    return;
  }

  // Auto-connect to local agent (no token needed)
  autoConnectAgent();
}

function onSignedOut() {
  isAuthed = false;
  isLive = false;
  removeBridge();
  authBtn.textContent = 'Sign in';
  navStatus.style.display = 'none';
  if (modeBadge) { modeBadge.textContent = ''; modeBadge.className = 'mode-badge'; }
  clearChat();
  showWelcome();
}

// ── Auto-connect to local agent ──
// Agent injects pairing token into bridge HTML, so no manual token entry needed.
// We just embed the iframe and wait for auth_ok.

let bridgeFrame = null;
let bridgeReady = false;

function removeBridge() {
  if (bridgeFrame) {
    bridgeFrame.remove();
    bridgeFrame = null;
    bridgeReady = false;
  }
}

async function autoConnectAgent() {
  console.log('autoConnectAgent called, clerkUserId:', clerkUserId);
  clearChat();
  addSystemMsg(I18N[currentLang].looking);

  let connected = false;

  // Phase 1: try direct tunnel URL (works without discovery service)
  console.log('Trying direct tunnel:', AGENT_TUNNEL_URL);
  try {
    const result = await tryBridgeConnect(AGENT_TUNNEL_URL, 'tunnel');
    console.log('Direct tunnel result:', result);
    if (result === 'auth_ok') {
      onAgentConnected('tunnel');
      connected = true;
      return;
    }
  } catch(e) {
    console.log('Direct tunnel failed:', e.message);
    removeBridge();
  }

  // Phase 2: try discovery service (fallback if tunnel URL changes)
  if (clerkUserId) {
    console.log('Looking up tunnel via discovery service…');
    try {
      const resp = await fetch(`${DISCOVERY_URL}/discover/lookup?user_id=${clerkUserId}`);
      const data = await resp.json();
      if (data.found && data.tunnel_url && data.tunnel_url !== AGENT_TUNNEL_URL) {
        console.log('Found tunnel:', data.tunnel_url);
        const result = await tryBridgeConnect(data.tunnel_url, 'discovery');
        console.log('Discovery tunnel result:', result);
        if (result === 'auth_ok') {
          onAgentConnected('tunnel');
          connected = true;
          return;
        }
      } else {
        console.log('No tunnel registered for user', clerkUserId);
      }
    } catch(e) {
      console.log('Discovery lookup failed:', e.message);
    }
  }

  if (!connected) {
    removeBridge();
    clearChat();
    const panel = document.createElement('div');
    const d = I18N[currentLang];
    panel.className = 'msg';
    panel.innerHTML = `<div class="bubble system">
      <div class="connect-panel">
        <h3>${d.not_found}</h3>
        <p>${d.not_found_desc}</p>
        <div class="step"><b>Step 1.</b> ${currentLang === 'zh' ? '在你的电脑上安装 Welian CLI' : 'On your computer, install Welian CLI'}:<br><code>pip install welian</code></div>
        <div class="step"><b>Step 2.</b> ${currentLang === 'zh' ? '启动 agent 并开启隧道' : 'Start the agent with tunnel'}:<br><code>welian agent --tunnel</code></div>
        <p><small>${currentLang === 'zh' ? '然后重试——手机会自动找到它。' : 'Then retry — your phone will find it automatically.'}</small></p>
        <button onclick="autoConnectAgent()">${d.retry}</button>
      </div>
    </div>`;
    body.appendChild(panel);
  }
}

function tryBridgeConnect(url, label) {
  return new Promise((resolve) => {
    let resolved = false;
    let iframeLoaded = false;
    const timeout = setTimeout(() => {
      if (!resolved) {
        resolved = true;
        console.log(`${label}: timeout. iframeLoaded=${iframeLoaded}`);
        resolve('no_bridge');
      }
    }, 4000);

    // Create hidden iframe — agent injects token into the page
    bridgeFrame = document.createElement('iframe');
    bridgeFrame.style.display = 'none';
    bridgeFrame.src = url;

    // Detect iframe load
    bridgeFrame.onload = () => { iframeLoaded = true; console.log(`${label}: iframe loaded`); };

    const handler = (e) => {
      const msg = e.data;
      if (!msg || msg.source !== 'welian-bridge') return;

      if (msg.type === 'ready') {
        console.log(`${label}: bridge ready`);
      } else if (msg.type === 'device-id') {
        // Bridge sent us the device_id — link it to Clerk user for discovery
        console.log(`${label}: device_id=${msg.device_id}`);
        if (clerkUserId && msg.device_id) {
          fetch(`${DISCOVERY_URL}/discover/link`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({user_id: clerkUserId, device_id: msg.device_id}),
          }).then(r=>r.json()).then(d=>{
            console.log('Linked device to user:', d);
          }).catch(e=>console.log('Link failed:', e));
        }
      } else if (msg.type === 'ws-message' && !resolved) {
        const data = msg.data;
        console.log(`${label}: ws-message`, data.type);
        if (data.type === 'auth_ok') {
          resolved = true;
          clearTimeout(timeout);
          bridgeReady = true;
          window.removeEventListener('message', handler);
          resolve('auth_ok');
        } else if (data.type === 'error') {
          resolved = true;
          clearTimeout(timeout);
          window.removeEventListener('message', handler);
          resolve('no_bridge');
        }
      } else if (msg.type === 'ws-error' && !resolved) {
        console.log(`${label}: ws-error`);
        resolved = true;
        clearTimeout(timeout);
        window.removeEventListener('message', handler);
        resolve('no_bridge');
      } else if (msg.type === 'log' && !resolved) {
        console.log(`${label}: [bridge]`, msg.message);
      }
    };
    window.addEventListener('message', handler);

    bridgeFrame.onerror = () => {
      if (!resolved) { resolved = true; clearTimeout(timeout); resolve('no_bridge'); }
    };

    document.body.appendChild(bridgeFrame);
  });
}

function onAgentConnected(port) {
  isLive = true;
  if (modeBadge) { modeBadge.textContent = 'Live'; modeBadge.className = 'mode-badge live'; }
  statusDot.className = 'status-dot online';
  statusText.textContent = 'Connected';

  // Listen for messages from bridge (use named function so we can debug)
  window.addEventListener('message', onBridgeMessage);

  clearChat();
  addMsg('ai', I18N[currentLang].connected);
}

function onBridgeMessage(e) {
  const msg = e.data;
  if (!msg || msg.source !== 'welian-bridge') return;

  if (msg.type === 'ws-message') {
    const data = msg.data;
    console.log('Bridge ws-message:', data.type);
    removeTyping();
    if (data.type === 'response' && data.reply) {
      addMsg('ai', data.reply);
    } else if (data.type === 'response' && data.data) {
      addMsg('ai', JSON.stringify(data.data, null, 2));
    } else if (data.type === 'error') {
      addMsg('ai', 'Error: ' + data.message);
    } else if (data.type === 'auth_ok') {
      // ignore — already handled
    }
  } else if (msg.type === 'ws-close') {
    console.log('Bridge ws-close');
    removeTyping();
    addSystemMsg('Connection lost. Retrying…');
    isLive = false;
    if (modeBadge) { modeBadge.textContent = ''; modeBadge.className = 'mode-badge'; }
    statusDot.className = 'status-dot offline';
    statusText.textContent = 'Disconnected';
  }
}

// ── Chat ──

function hideWelcome() {
  if (welcomeState) {
    welcomeState.classList.add('hidden');
  }
}

function showWelcome() {
  if (welcomeState) {
    welcomeState.classList.remove('hidden');
  }
}

function scrollToBottom() {
  body.scrollTop = body.scrollHeight;
  requestAnimationFrame(() => { body.scrollTop = body.scrollHeight; });
}

function addMsg(who, text) {
  hideWelcome();
  const d = document.createElement('div');
  d.className = 'msg';
  const label = who === 'ai' ? 'Welian' : 'You';
  d.innerHTML = '<div class="who ' + who + '">' + label + '</div><div class="bubble ' + who + '">' + escapeHtml(text) + '</div>';
  body.appendChild(d);
  scrollToBottom();
}

function addSystemMsg(text) {
  hideWelcome();
  const d = document.createElement('div');
  d.className = 'msg';
  d.innerHTML = '<div class="bubble system">' + escapeHtml(text) + '</div>';
  body.appendChild(d);
  scrollToBottom();
}

function addTyping() {
  hideWelcome();
  const d = document.createElement('div');
  d.className = 'msg';
  d.id = 'typing';
  d.innerHTML = '<div class="who ai">Welian</div><div class="bubble ai"><span class="typing"></span></div>';
  body.appendChild(d);
  scrollToBottom();
}

function removeTyping() {
  document.getElementById('typing')?.remove();
  scrollToBottom();
}

function clearChat() {
  body.innerHTML = '';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg('you', text);
  addTyping();

  if (isLive && bridgeFrame && bridgeReady) {
    // Live mode: send via iframe bridge → WebSocket
    const reqId = Date.now().toString();
    bridgeFrame.contentWindow.postMessage({
      source: 'welian-parent',
      type: 'send',
      payload: { cmd: 'chat', id: reqId, text: text }
    }, '*');
  } else {
    // Not connected — prompt to sign in
    removeTyping();
    addMsg('ai', I18N[currentLang].signin_prompt);
  }
}

function quickSend(text) {
  input.value = text;
  send();
}

function quickNote() {
  hideWelcome();
  input.value = 'note: ';
  input.focus();
  input.setSelectionRange(6, 6);
}

function quickDraft() {
  hideWelcome();
  input.value = 'draft a message to ';
  input.focus();
  const len = input.value.length;
  input.setSelectionRange(len, len);
}

// ── Init ──
applyLang(currentLang);
initClerk();
</script>
