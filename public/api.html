<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welian Cloud AI API — Documentation</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css">
  <style>
    body { margin: 0; }
    .topbar { display: none; }
    .swagger-ui .wrapper { max-width: 1200px; }
    .header-bar {
      background: linear-gradient(135deg, #4A6741 0%, #5a7a51 100%);
      color: white;
      padding: 16px 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-bar h1 { font-size: 20px; margin: 0; font-weight: 600; }
    .header-bar .subtitle { font-size: 14px; opacity: 0.85; }
    .header-bar .badge {
      background: rgba(255,255,255,0.2);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header-bar">
    <h1>Welian Cloud AI API</h1>
    <span class="badge">v2.0.0</span>
    <span class="subtitle">数据归你，智能来云</span>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = function() {
      const ui = SwaggerUIBundle({
        url: './openapi.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: 'StandaloneLayout',
        filter: true,
        showExtensions: true,
        showCommonExtensions: true,
        docExpansion: 'list',
        operationsSorter: 'alpha',
        tagsSorter: 'alpha',
      });
    };
  </script>
</body>
</html>
