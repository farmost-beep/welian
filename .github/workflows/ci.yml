name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python unit tests (fast, no LLM) ──
  python-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e . pytest pytest-cov -q
      - run: pytest tests/ --ignore=tests/e2e -q --tb=short --cov=src/welian --cov-report=term-missing

  # ── Worker unit tests (vitest, fast) ──
  worker-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npx vitest run --coverage

  # ── E2E tests (real LLM, ~2 min, non-blocking — LLM is non-deterministic) ──
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e . pytest -q
      - name: Run E2E tests with real LLM
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          LLM_ENGINE: claude
        run: pytest tests/e2e/ -v --tb=short
        timeout-minutes: 5

  # ── L0-L2 Journey tests (browser tests, publish-blocking) ──
  journey:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run journey tests (L0 smoke + L1 activation + L2 core loop)
        run: npx playwright test --project=journey --reporter=line
        timeout-minutes: 10

  # ── Auth tests (mock + real Clerk, non-blocking info) ──
  auth-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run auth tests (mock + real Clerk)
        env:
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: npx playwright test --project=mock-clerk --project=real-clerk --reporter=line
        timeout-minutes: 3
        continue-on-error: true  # Auth tests are informational, don't block deploy

  # ── k6 smoke performance test (no-auth endpoint, ~35s) ──
  perf-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true  # Performance is informational, don't block deploy
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/perf/k6-ci.js
          flags: --env BASE_URL=https://api.welian.app
        timeout-minutes: 3

  # ── Deploy (only on main push, after deterministic tests pass) ──
  # e2e is continue-on-error (LLM non-deterministic), so not listed in needs.
  # journey is publish-blocking (L0-L2 user journeys must pass).
  deploy:
    needs: [python-unit, worker-unit, journey]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public/ --project-name=welian
