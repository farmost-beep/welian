name = "welian-ai"
main = "src/worker.js"
compatibility_date = "2024-09-01"
workers_dev = true

routes = [
  { pattern = "api.welian.app/*", zone_name = "welian.app" }
]

[vars]
LLM_MODEL = "MiniMax-M3"
LLM_BASE_URL = "https://api.minimaxi.com/anthropic"
LLM_MODEL_ENHANCED = "MiniMax-M3"
LLM_BASE_URL_ENHANCED = "https://api.minimaxi.com/anthropic"
LLM_MODEL_PREMIUM = "MiniMax-M3"
LLM_BASE_URL_PREMIUM = "https://api.minimaxi.com/anthropic"
PADDLE_ENVIRONMENT = "production"
# Model tier differentiation: all tiers use MiniMax-M3 (only flagship available).
# Enhanced (x3): same model, higher multiplier = more budget for complex prompts.
# Premium (x10): same model + service_tier=priority (1.5x cost, faster + more reliable).
# When Anthropic API key is added, set LLM_MODEL_ENHANCED=claude-sonnet-4-20250514 etc.

# KV namespace for device discovery (tunnel URL registry)
[[kv_namespaces]]
binding = "DEVICES"
id = "9d6745b3fcc7459999b78497c267d9b1"
preview_id = "636d9d7704b1460ea19caf7186cd4f90"

# KV namespace for user data context (synced from agent)
[[kv_namespaces]]
binding = "USER_DATA"
id = "98c045b73d874a869493706dc585bafb"
preview_id = "98c045b73d874a869493706dc585bafb"

# Set LLM_API_KEY via: wrangler secret put LLM_API_KEY

# ── Multi-platform IM (Phase 1: Telegram, Phase 2: Feishu + DingTalk) ──
# Set via: wrangler secret put <NAME>
#
# Telegram:
# TELEGRAM_BOT_TOKEN       — Telegram bot token from @BotFather
# TELEGRAM_WEBHOOK_SECRET  — secret token for webhook verification (set when calling setWebhook)
# Webhook URL: https://api.welian.app/im/telegram/webhook
# Setup: curl "https://api.telegram.org/bot<TOKEN>/setWebhook" \
#          -d "url=https://api.welian.app/im/telegram/webhook" \
#          -d "secret_token=<TELEGRAM_WEBHOOK_SECRET>"
#
# Feishu / Lark:
# FEISHU_APP_ID            — App ID from https://open.feishu.cn 企业自建应用
# FEISHU_APP_SECRET        — App Secret
# FEISHU_ENCRYPT_KEY       — Encrypt Key (事件订阅加密密钥，可选但推荐)
# FEISHU_VERIFICATION_TOKEN — Verification Token (事件订阅验证令牌)
# Webhook URL: https://api.welian.app/im/feishu/webhook
# 订阅事件: im.message.receive_v1
#
# DingTalk:
# DINGTALK_APP_KEY         — AppKey from https://open-dev.dingtalk.com 企业内部应用
# DINGTALK_APP_SECRET      — App Secret
# Webhook URL: https://api.welian.app/im/dingtalk/webhook
# 机器人消息接收模式: HTTP 模式

# ── Paddle (global payments, USD) ──
# Set via: wrangler secret put <NAME>
# PADDLE_API_KEY           — Paddle API key (paddle_...)
# PADDLE_WEBHOOK_SECRET    — Webhook signing secret (whsec_...)
# PADDLE_ENVIRONMENT       — "sandbox" or "production" (set in [vars] below)
# PADDLE_PRICE_PRO_MONTHLY — price_id for Pro Monthly ($4.99/mo)
# PADDLE_PRICE_PRO_YEARLY  — price_id for Pro Yearly ($49/yr)
# PADDLE_PRICE_CREDITS_100 — price_id for 100 credits ($1.99)
# PADDLE_PRICE_CREDITS_500 — price_id for 500 credits ($7.99)
# Paddle webhook URL: https://api.welian.app/ai/paddle/webhook

# Cron: weekly report push every Monday 09:00 CST (01:00 UTC)
# Cron: daily signals push 07:00 CST (23:00 UTC previous day)
# Cron: health warning push biweekly (1st & 15th) 09:00 CST (01:00 UTC)
[triggers]
crons = ["0 1 * * 1", "0 23 * * *", "0 1 1,15 * *"]
